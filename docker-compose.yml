# =============================================================================
# Agent Worker Docker Compose
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in VPS_API_KEY
#   2. Put credentials.json and token.pickle in ./workspace/
#   3. Run: docker-compose up --build
# =============================================================================

services:
  agent:
    build: .
    container_name: agent-worker
    
    # Load environment from .env file
    env_file:
      - .env
    
    # Mount workspace for credentials and output
    # Mount source files so code changes are live without rebuilding
    volumes:
      - ./workspace:/workspace
      - ./workflows:/app/workflows
      - ./core.py:/app/core.py
      - ./memory.py:/app/memory.py
      - ./research.py:/app/research.py
      - ./router.py:/app/router.py
      - ./tools_google.py:/app/tools_google.py
      - ./tools_web.py:/app/tools_web.py
      - ./agent_worker.py:/app/agent_worker.py
    
    # Allow connecting to LM Studio on host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    # Restart on failure
    restart: unless-stopped
    
    # Resource limits (optional, adjust as needed)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G

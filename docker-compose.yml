# =============================================================================
# Agent Worker Docker Compose
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in VPS_API_KEY
#   2. Put credentials.json and token.pickle in ./workspace/
#   3. Run: docker-compose up --build
# =============================================================================

services:
  agent:
    build: .
    container_name: agent-worker
    
    # Load environment from .env file
    env_file:
      - .env
    
    # Mount workspace for credentials and output
    volumes:
      - ./workspace:/workspace
    
    # Allow connecting to LM Studio on host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    # Restart on failure
    restart: unless-stopped
    
    # Resource limits (optional, adjust as needed)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G
